help.ta.flow-title=Step-by-step
help.ta.step1=Sign in; land on Dashboard and read the three summary metrics.
help.ta.step2=Open Profile: enter full name, student number, @bupt.edu.cn email, phone, skills, and availability; click Save profile.
help.ta.step3=Upload CV on the same page (.pdf/.doc/.docx, ≤10 MB). PDF enables AI CV analysis in AI Assist.
help.ta.step4=Open Jobs; pick an Open posting; click View detail.
help.ta.step5=On job detail read module code, skills, workload, requirements, deadline; note the fit score and missing-skills warning.
help.ta.step6=Submit application: choose Priority 1/2/3, enter your skills and description (required), optional motivation note, then Submit; status becomes Submitted.
help.ta.step7=You may hold at most 3 application records total (rejected applications still count); cannot apply twice to the same job or to Closed jobs.
help.ta.step8=Open My Applications to see Submitted / Under Review / Accepted / Rejected; rejected rows stay visible.
help.ta.step9=When MO accepts you, Accepted count rises; at 3 Accepted you cannot receive another acceptance.
help.ta.step10=Check Inbox for decisions, remaining application slots, and overload warnings.
help.ta.step11=Use Search to find jobs or your applications by keyword.
help.ta.step12=Use AI Assist for optional fit/chat guidance — it does not replace MO decisions.
help.mo.eyebrow=Module Organizer
help.mo.heading=MO — full workflow
help.mo.credentials=Account: mo.demo / MoDemo123 → opens MO Dashboard
help.mo.nav-title=Sidebar pages
help.mo.nav1=Dashboard — posting list, status, applicant counts
help.mo.nav2=Posts — create, edit, save, close postings
help.mo.nav3=Review — per-job applicant queue and decisions
help.mo.nav4=AI Assist — shortlist and chat support
help.mo.nav5=Search — find applicants, jobs, or applications
help.mo.nav6=Inbox — read review and status notifications
help.mo.flow-title=Step-by-step
help.mo.step1=Sign in; Dashboard lists your modules, Open/Closed status, and applicant totals.
help.mo.step2=Open Posts: the left table lists existing postings; click Edit or start a blank form on the right.
help.mo.step3=Fill module code, title, required skills, description, requirements, weekly workload label, weekly hours (positive number), and a deadline. When creating a new posting, the deadline must be in the future; Save.
help.mo.step4=New postings are Open by default and appear in the TA job list immediately after save.
help.mo.step5=When hiring ends, use Close posting — TAs can no longer apply; existing applications remain for review.
help.mo.step6=Open Review; switch posting with the job chips at the top; applicant table shows priority, skill-fit %, and CV link.
help.mo.step7=Click an applicant row to open the detail panel: read profile summary, open View CV in a new tab if uploaded.
help.mo.step8=Set status to Under Review, Shortlisted, Accepted, or Rejected. Use Bulk shortlist to mark multiple eligible applicants Shortlisted. Acceptance is blocked if the TA already has 3 Accepted jobs.
help.mo.step9=Accepted applications update TA dashboards, workload, and may trigger Inbox notifications to the TA.
help.mo.step10=Use Search (category Applicants) to find TA profiles; use Inbox for review reminders and status changes.
help.mo.step11=Optional: AI Assist for MO chat/tools — all hiring outcomes still require your explicit status on Review.
help.admin.eyebrow=Programme Admin
help.admin.heading=Admin — monitoring workflow
help.admin.credentials=Account: admin.demo / AdminDemo123 → opens Admin Dashboard
help.admin.nav-title=Sidebar pages
help.admin.nav1=Dashboard — TA allocation and workload overview
help.admin.nav2=Overview — system scope and quick links
help.admin.nav3=AI Assist — workload balancing advice
help.admin.nav4=Search — lookup jobs, applications, or applicants
help.admin.nav5=Inbox — read workload and system alerts
help.admin.flow-title=Step-by-step
help.admin.step1=Sign in; Workload dashboard shows total TAs, total accepted assignments, and weekly-hour overload alert count.
help.admin.step2=Read the workload threshold note. The Admin dashboard flags overload risk from accepted jobs whose total weekly hours exceed the threshold.
help.admin.step3=Use the search box on this page to filter the workload table by TA name.
help.admin.step4=Each row lists accepted modules, accepted count, and total weekly hours; Balanced vs Overload risk reflects weekly-hour workload.
help.admin.step5=Admin does not post jobs, upload CVs, or change application status — monitoring only.
help.admin.step6=Open Overview in the Admin sidebar to see the system overview and role cards. To demonstrate another role, use Logout and sign in with that role's account.
help.admin.step7=Check Inbox for overload and deadline-style notifications across the programme.
help.admin.step8=Use global Search if you need jobs/applications/applicants outside the workload filter.
help.admin.step9=Optional: AI Assist Admin tab for workload balancing suggestions — verify against the table before acting.

