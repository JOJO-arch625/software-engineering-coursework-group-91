# ---- Help modal ----
help.eyebrow=User guide
help.title=Complete ISTARS user guide (TA / MO / Admin)
help.intro=Use this guide as an on-screen manual for the pages, buttons, forms, and status labels visible in ISTARS. Choose the correct demo account on the Login page, then follow the sidebar for your role.
help.footnote=Recommended demo order: TA flow → Logout → MO flow → Logout → Admin workload → AI Assist. To switch roles, use Logout in the top bar first. Press Esc, Close, or click outside this panel to dismiss Help.
help.section.general=1. Getting started
help.general.li1=Open the Login page in the browser and use one of the demo accounts shown on the login screen.
help.general.li2=Demo accounts: TA ta.demo / TaDemo123, MO mo.demo / MoDemo123, Admin admin.demo / AdminDemo123.
help.general.li3=After login, the app opens the home page for that role: TA Dashboard, MO Dashboard, or Admin Dashboard.
help.general.li4=If you try to open a page for another role, the app shows a permission message and returns you to your own workspace.
help.general.li5=Green, red, and blue message banners below the page header confirm saves, validation errors, and blocked actions.
help.general.li6=For a live demo, apply as TA, review as MO, then check workload as Admin.
help.section.ui=2. Interface and navigation
help.ui.li1=The left sidebar shows the pages available to the signed-in role, plus shared AI Assist, Search, and Inbox.
help.ui.li2=Use the top-left menu button to collapse or expand the sidebar.
help.ui.li3=The top bar shows the workspace label, Search, Inbox unread count, user initials, Help, language switch, and Logout.
help.ui.li4=The summary banner below the top bar shows the current page title and three page metrics.
help.ui.li5=The bottom-right scroll button moves down the page or returns to the top when you reach the end.
help.ui.li6=Tables use clickable names or buttons such as View detail, Edit, Review, Open CV, and View details.
help.ui.li7=Forms use visible buttons such as Save, Submit, Create, Edit, Close, Clear, and Cancel.
help.section.rules=3. Core business rules (all roles)
help.rules.li1=A TA may have at most 3 application records in total, including rejected applications; duplicate applications to the same job are blocked.
help.rules.li2=A TA may have at most 3 Accepted jobs. MO cannot accept another application for a TA who already has 3 Accepted jobs.
help.rules.li3=Only Open jobs appear in the TA Jobs page and accept new applications; Closed jobs block new applications.
help.rules.li4=Rejected applications remain visible in Applications so the TA can still see the final decision.
help.rules.li5=Application statuses visible in the app are Submitted, Under Review, Shortlisted, Accepted, and Rejected.
help.rules.li6=TA profile requires full name, student number, BUPT email, skills, and availability; phone is optional.
help.rules.li7=CV upload accepts PDF, DOC, and DOCX files up to 10 MB. PDF files can also be used by AI Assist for CV analysis.
help.rules.li8=MO job posting forms require module code, title, skills, knowledge requirements, workload, weekly hours, and deadline. Description is shown to applicants but is optional.
help.rules.li9=Admin monitors accepted assignments and workload risk but does not publish jobs, upload CVs, or change applicant decisions.
help.rules.li10=To view another role's pages, use Logout and sign in again with that role's demo account.
help.section.routes=4. Visible pages and controls
help.routes.common-title=Shared controls
help.routes.common1=Login page — enter username and password; demo accounts are displayed on the page.
help.routes.common2=Search — keyword search for visible jobs, applications, and applicants depending on role.
help.routes.common3=Inbox — read notifications and mark one or all notifications as read.
help.routes.common4=AI Assist — optional advice workspace with CV, chat, and role-specific panels.
help.routes.common5=Top bar — use Help, language switch, Search, Inbox, and Logout from any signed-in page.
help.routes.ta-title=TA sidebar
help.routes.ta1=Dashboard — summary cards and quick actions
help.routes.ta2=Profile — profile form and CV upload
help.routes.ta3=Jobs — open job list
help.routes.ta4=Job Detail — job information, fit score, and application form after clicking View detail
help.routes.ta5=Applications — all submitted applications and decision statuses
help.routes.ta6=Open CV — available after uploading a CV or when a reviewer opens an applicant CV
help.routes.mo-title=MO sidebar
help.routes.mo1=Dashboard — posting overview, applicant count, and review status
help.routes.mo2=Posts — create, edit, save, and close job postings
help.routes.mo3=Review — switch jobs, open applicant details, view CVs, shortlist, accept, or reject
help.routes.admin-title=Admin sidebar
help.routes.admin1=Dashboard — workload table, weekly-hour risk flag, and TA search
help.routes.admin2=Overview — visible Admin sidebar page with system overview and role cards
help.section.optional=5. Optional modules
help.optional.ai-title=AI Assist
help.optional.ai1=AI Assist gives advice only; MO decisions must still be made manually on Review.
help.optional.ai2=TA can use fit score, missing-skill hints, PDF CV analysis, and chat advice.
help.optional.ai3=MO can use skill-fit percentages, CV evidence, applicant summaries, and chat support.
help.optional.ai4=Admin can use workload advice to discuss balancing accepted assignments.
help.optional.ai5=If AI details are unavailable, use the visible score, warning, and table information as the source of truth.
help.optional.ai6=AI Assist never auto-accepts or auto-rejects applications.
help.optional.search-title=Search
help.optional.search1=Choose a category such as All, Jobs, Applications, or Applicants when the option is visible.
help.optional.search2=TA Search shows open jobs and the TA's own applications.
help.optional.search3=MO and Admin can also search applicant profiles.
help.optional.search4=Use Clear to reset the search form.
help.optional.inbox-title=Inbox
help.optional.inbox1=Inbox shows application updates, review reminders, workload warnings, and deadline-style messages.
help.optional.inbox2=Unread count appears in the sidebar and top bar.
help.optional.inbox3=Use View details when a notification includes a page link.
help.optional.inbox4=Use Mark as read or Mark all as read to clear unread messages.
help.section.data=6. Demo tips
help.data.li1=Use the demo account cards on the Login page to choose TA, MO, or Admin.
help.data.li2=Use Logout before switching to a different identity.
help.data.li3=Use the language switch in the top bar to change between English and Chinese.
help.data.li4=If a page still shows old styling after an update, refresh the browser page.
help.data.li5=Use Help again any time you need to review the workflow.
