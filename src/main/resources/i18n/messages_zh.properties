# ---- Help modal ----
help.eyebrow=使用指南
help.title=ISTARS 完整使用说明（TA / MO / Admin）
help.intro=本指南是 ISTARS 的页面使用手册，只说明用户能直接看到的页面、按钮、表单和状态标签。请在登录页选择正确的演示账号，然后按照当前身份的侧边栏操作。
help.footnote=推荐演示顺序：TA 流程 → 退出登录 → MO 流程 → 退出登录 → Admin 工作量 → AI 助手。切换身份前，请先使用顶栏的退出登录。按 Esc、关闭或点击面板外部可关闭帮助。
help.section.general=1. 入门与访问
help.general.li1=打开登录页，使用页面上显示的任一演示账号。
help.general.li2=演示账号：TA ta.demo / TaDemo123，MO mo.demo / MoDemo123，Admin admin.demo / AdminDemo123。
help.general.li3=登录后，系统会打开该身份的首页：TA 仪表盘、MO 仪表盘或 Admin 仪表盘。
help.general.li4=如果尝试打开其他身份的页面，系统会显示权限提示，并返回当前身份自己的工作区。
help.general.li5=页面标题下方的绿色、红色和蓝色提示条会确认保存、校验错误和被阻止的操作。
help.general.li6=现场演示时，先以 TA 申请，再以 MO 审核，最后以 Admin 检查工作量。
help.section.ui=2. 界面与导航
help.ui.li1=左侧边栏显示当前登录身份可用的页面，以及共用的 AI 助手、搜索和收件箱。
help.ui.li2=使用左上角菜单按钮收起或展开侧边栏。
help.ui.li3=顶栏显示工作区名称、搜索、收件箱未读数、用户缩写、帮助、语言切换和退出登录。
help.ui.li4=顶栏下方的摘要区显示当前页面标题和三张页面指标卡。
help.ui.li5=右下角滚动按钮可向下滚动页面，页面到底后可返回顶部。
help.ui.li6=表格中可点击姓名或按钮，例如查看详情、编辑、审核和 Open CV。
help.ui.li7=表单中会出现保存、提交、创建、编辑、关闭、清除和取消等可见按钮。
help.section.rules=3. 核心业务规则（全角色适用）
help.rules.li1=每名 TA 最多有 3 条申请记录，包括已拒绝申请；同一岗位不能重复申请。
help.rules.li2=每名 TA 最多有 3 个已录取岗位。如果 TA 已有 3 个已录取岗位，MO 不能再接受该 TA 的新申请。
help.rules.li3=只有开放岗位会显示在 TA 的职位浏览页面并接受新申请；已关闭岗位会阻止新申请。
help.rules.li4=已拒绝申请仍会保留在我的申请页面，TA 可以继续看到最终决定。
help.rules.li5=应用中可见的申请状态包括已提交、审核中、已入围、已录用和已拒绝。
help.rules.li6=TA 个人资料需要姓名、学号、BUPT 邮箱、技能和可用时间；电话为选填。
help.rules.li7=CV 上传支持 PDF、DOC 和 DOCX，最大 10 MB。PDF 文件也可用于 AI 助手的 CV 分析。
help.rules.li8=MO 的岗位发布表单需要模块代码、标题、技能、知识要求、工作量、周工时和截止日期。描述会展示给申请人，但为选填。
help.rules.li9=Admin 监控已录取分配和工作量风险，但不发布岗位、不上传 CV、不修改申请决定。
help.rules.li10=如需查看其他身份的页面，请使用退出登录，并用该身份的演示账号重新登录。
help.section.routes=4. 可见页面与控件
help.routes.common-title=共用控件
help.routes.common1=登录页 - 输入用户名和密码；页面上显示演示账号。
help.routes.common2=搜索 - 按关键词搜索当前身份可见的岗位、申请和申请人。
help.routes.common3=收件箱 - 查看通知，并将单条或全部通知标为已读。
help.routes.common4=AI 助手 - 可选建议工作区，包含 CV、对话和角色面板。
help.routes.common5=顶栏 - 登录后可从任意页面使用帮助、语言切换、搜索、收件箱和退出登录。
help.routes.ta-title=TA 侧边栏
help.routes.ta1=仪表盘 - 摘要卡片和快捷操作
help.routes.ta2=个人资料 - 个人资料表单和 CV 上传
help.routes.ta3=职位浏览 - 开放岗位列表
help.routes.ta4=岗位详情 - 点击查看详情后查看岗位信息、匹配分和申请表
help.routes.ta5=我的申请 - 所有已提交申请和决定状态
help.routes.ta6=Open CV - 上传 CV 后可用；审核人打开申请人 CV 时也会使用
help.routes.mo-title=MO 侧边栏
help.routes.mo1=仪表盘 - 岗位概览、申请人数和审核状态
help.routes.mo2=发布管理 - 创建、编辑、保存和关闭岗位发布
help.routes.mo3=申请审核 - 切换岗位、打开申请人详情、查看 CV、入围、录取或拒绝
help.routes.admin-title=Admin 侧边栏
help.routes.admin1=仪表盘 - 工作量表、周工时风险标记和 TA 搜索
help.routes.admin2=总览 - Admin 侧边栏中的系统总览和角色卡片页面
help.section.optional=5. 可选模块
help.optional.ai-title=AI 助手
help.optional.ai1=AI 助手只提供建议；MO 的最终决定仍必须在申请审核中手动完成。
help.optional.ai2=TA 可使用匹配分、缺失技能提示、PDF CV 分析和对话建议。
help.optional.ai3=MO 可使用技能匹配百分比、CV 证据、申请人摘要和对话辅助。
help.optional.ai4=Admin 可使用工作量建议来讨论已录取分配是否平衡。
help.optional.ai5=如果 AI 详情不可用，请以页面上可见的分数、提示和表格信息为准。
help.optional.ai6=AI 助手永远不会自动录取或拒绝申请。
help.optional.search-title=搜索
help.optional.search1=当选项可见时，选择全部、职位、申请或申请人等类别。
help.optional.search2=TA 搜索显示开放岗位和 TA 自己的申请。
help.optional.search3=MO 和 Admin 也可以搜索申请人资料。
help.optional.search4=使用清除重置搜索表单。
help.optional.inbox-title=收件箱
help.optional.inbox1=收件箱显示申请更新、审核提醒、工作量警告和截止日期类消息。
help.optional.inbox2=未读数会显示在侧边栏和顶栏。
help.optional.inbox3=当通知包含页面链接时，使用查看详情进入相关页面。
help.optional.inbox4=使用标记已读或全部标记已读清除未读消息。
help.section.data=6. 演示提示
help.data.li1=使用登录页上的演示账号卡片选择 TA、MO 或 Admin。
help.data.li2=切换到不同身份前，请先使用退出登录。
help.data.li3=使用顶栏的语言切换在英文和中文之间切换。
help.data.li4=如果页面仍显示旧样式，请刷新浏览器页面。
help.data.li5=需要回顾流程时，可以随时再次打开帮助。
help.ta.eyebrow=助教 (TA)
help.ta.heading=TA 完整流程
help.ta.credentials=账号：ta.demo / TaDemo123 → 进入 TA 仪表盘
help.ta.nav-title=边栏页面
help.ta.nav1=仪表盘 - 已提交申请数、已录取数量和剩余名额
help.ta.nav2=个人资料 - 个人资料和 CV 上传
help.ta.nav3=职位浏览 - 仅显示开放岗位
help.ta.nav4=我的申请 - 每一条申请及其状态
help.ta.nav5=AI 助手 - 匹配建议和对话
help.ta.nav6=搜索 - 查找岗位或申请
help.ta.nav7=收件箱 - 查看提醒和状态通知
help.ta.flow-title=操作步骤
help.ta.step1=登录；进入仪表盘，并查看三张摘要指标。
help.ta.step2=打开个人资料：填写姓名、学号、@bupt.edu.cn 邮箱、电话、技能和可用时间；点击保存资料。
help.ta.step3=在同一页面上传 CV（.pdf/.doc/.docx，≤10 MB）。PDF 可用于 AI 助手的 CV 分析。
help.ta.step4=打开职位浏览；选择一个开放岗位；点击查看详情。
help.ta.step5=在岗位详情中阅读模块代码、技能、工作量、要求和截止日期；查看匹配分和缺失技能提示。
help.ta.step6=提交申请：选择优先级 1/2/3，填写技能和说明（必填），可选填写申请动机，然后点击提交；状态变为已提交。
help.ta.step7=最多可有 3 条申请记录（包括已拒绝申请）；不能重复申请同一岗位，也不能申请已关闭岗位。
help.ta.step8=打开我的申请，查看已提交、审核中、已录用和已拒绝；已拒绝记录仍保持可见。
help.ta.step9=当 MO 接受你时，已录取数量会上升；达到 3 个已录取后不能再获得新的录取。
help.ta.step10=查看收件箱，了解决定、剩余申请名额和超负荷提醒。
help.ta.step11=使用搜索，通过关键词查找岗位或你的申请。
help.ta.step12=使用 AI 助手获取可选的匹配/对话建议；它不会替代 MO 决定。
help.mo.eyebrow=课程负责人 (MO)
help.mo.heading=MO 完整流程
help.mo.credentials=账号：mo.demo / MoDemo123 → 进入 MO 仪表盘
help.mo.nav-title=边栏页面
help.mo.nav1=仪表盘 - 岗位列表、状态和申请人数
help.mo.nav2=发布管理 - 创建、编辑、保存和关闭岗位
help.mo.nav3=申请审核 - 按岗位查看申请队列并做出决定
help.mo.nav4=AI 助手 - 入围建议和对话辅助
help.mo.nav5=搜索 - 查找申请人、岗位或申请
help.mo.nav6=收件箱 - 查看审核和状态通知
help.mo.flow-title=操作步骤
help.mo.step1=登录后进入仪表盘；仪表盘会列出你的模块、开放/关闭状态和申请人总数。
help.mo.step2=打开发布管理：左侧表格列出已有岗位；点击编辑，或在右侧开始填写空白表单。
help.mo.step3=填写模块代码、标题、所需技能、描述、要求、每周工作量说明、正数周工时和截止日期。新建岗位时，截止日期必须是未来日期；然后点击保存。
help.mo.step4=新建岗位发布默认是开放，并会在保存后立即显示在 TA 的职位浏览列表中。
help.mo.step5=招聘结束时，使用关闭岗位 - TA 不能再申请，但已有申请仍保留用于审核。
help.mo.step6=打开申请审核；使用顶部岗位标签切换岗位；申请人表格显示优先级、技能匹配百分比和 CV 链接。
help.mo.step7=点击申请人行打开详情面板：阅读资料摘要，如果已上传 CV，可在新标签页打开 View CV。
help.mo.step8=将状态设为审核中、已入围、已录用或已拒绝。使用批量入围可将多名申请人标记为已入围。若 TA 已有 3 个已录取岗位，则录取会被阻止。
help.mo.step9=已录取申请会更新 TA 仪表盘、工作量，并可能触发发给 TA 的收件箱通知。
help.mo.step10=使用搜索（类别选申请人）查找 TA 资料；使用收件箱查看审核提醒和状态变化。
help.mo.step11=可选：AI 助手提供 MO 对话/工具；所有录用结果仍需要你在申请审核中明确设置状态。
help.admin.eyebrow=项目管理员 (Admin)
help.admin.heading=Admin 监控流程
help.admin.credentials=账号：admin.demo / AdminDemo123 → 进入 Admin 仪表盘
help.admin.nav-title=边栏页面
help.admin.nav1=仪表盘 - TA 分配和工作量总览
help.admin.nav2=总览 - 系统范围和快捷入口
help.admin.nav3=AI 助手 - 工作量平衡建议
help.admin.nav4=搜索 - 查找岗位、申请或申请人
help.admin.nav5=收件箱 - 查看工作量和系统提醒
help.admin.flow-title=操作步骤
help.admin.step1=登录后进入仪表盘；工作量仪表盘显示 TA 总数、已录取分配总数和按周工时计算的超负荷告警数。
help.admin.step2=阅读工作量阈值说明。Admin 仪表盘根据已录取岗位的总周工时标记超负荷风险。
help.admin.step3=使用本页的搜索框按 TA 姓名筛选工作量表。
help.admin.step4=每一行显示已录取模块、已录取数量和总周工时；均衡与过载风险反映周工时工作量。
help.admin.step5=Admin 只负责监控：不发布岗位、不上传 CV、不修改申请状态。
help.admin.step6=打开 Admin 侧边栏中的总览，查看系统总览和角色卡片。如需演示其他身份，请使用退出登录并用该身份账号登录。
help.admin.step7=查看收件箱中的超负荷和截止日期类通知。
help.admin.step8=如果需要在工作量筛选之外查找岗位、申请或申请人，请使用全局搜索。
help.admin.step9=可选：使用 AI 助手的 Admin 标签页查看工作量平衡建议；行动前请与表格核对。

